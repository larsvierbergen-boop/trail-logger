<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trail Logger">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Trail Logger</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1117; color: #f0f0f0; font-family: system-ui, sans-serif; }
.screen { padding: 12px; padding-bottom: 40px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 0.5px solid #2a2d3a; }
.nav { display: flex; gap: 6px; margin-bottom: 14px; }
.nav-btn { flex: 1; padding: 9px 4px; border: 0.5px solid #2a2d3a; background: #1a1d27; color: #a0a3b1; border-radius: 10px; font-size: 12px; cursor: pointer; text-align: center; }
.nav-btn.active { background: #4ade80; color: #0f1117; border-color: #4ade80; font-weight: 500; }
.live-log { background: #1a1d27; border: 0.5px solid #2a2d3a; border-radius: 14px; padding: 10px 12px; margin-bottom: 10px; max-height: 160px; overflow-y: auto; }
.live-entry { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 0.5px solid #1e2130; }
.live-entry:last-child { border-bottom: none; }
.live-entry .ts { font-size: 12px; color: #4ade80; min-width: 36px; }
.live-entry .licon { font-size: 16px; width: 22px; text-align: center; }
.live-entry .lname { font-size: 13px; flex: 1; }
.live-entry .intv { font-size: 11px; color: #6b7280; min-width: 40px; text-align: right; }
.live-empty { font-size: 13px; color: #4b5563; text-align: center; padding: 10px 0; }
.cat-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; margin-top: 4px; }
.products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.product-btn { padding: 14px 10px; border-radius: 14px; border: 0.5px solid #2a2d3a; background: #1a1d27; color: #f0f0f0; cursor: pointer; text-align: center; user-select: none; -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
.product-btn:active { transform: scale(0.95); }
.product-btn.flashed { border-color: #4ade80; background: #1a2e1a; }
.product-btn .icon { font-size: 24px; margin-bottom: 5px; }
.product-btn .name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
.product-btn .detail { font-size: 11px; color: #6b7280; line-height: 1.4; }
.custom-section { background: #1a1d27; border: 0.5px solid #2a2d3a; border-radius: 14px; padding: 12px; margin-bottom: 14px; }
.custom-section input { width: 100%; background: #0f1117; border: 0.5px solid #2a2d3a; border-radius: 8px; color: #f0f0f0; font-size: 15px; padding: 10px 12px; margin-bottom: 10px; }
.custom-section input::placeholder { color: #4b5563; }
.add-btn { width: 100%; padding: 11px; background: #374151; border: none; border-radius: 10px; color: #f0f0f0; font-size: 14px; cursor: pointer; }
.log-list { display: flex; flex-direction: column; gap: 8px; }
.log-item { background: #1a1d27; border: 0.5px solid #2a2d3a; border-radius: 12px; padding: 11px 13px; display: flex; align-items: center; gap: 10px; }
.log-icon { font-size: 20px; width: 28px; text-align: center; }
.log-info { flex: 1; }
.log-name { font-size: 14px; font-weight: 500; }
.log-meta { font-size: 12px; color: #6b7280; margin-top: 2px; }
.log-time { font-size: 12px; color: #4ade80; text-align: right; }
.log-interval { font-size: 11px; color: #6b7280; text-align: right; }
.hour-divider { font-size: 11px; color: #4ade80; text-transform: uppercase; letter-spacing: 1px; padding: 4px 0 2px; border-top: 0.5px solid #1e3a1e; margin-top: 4px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-card { background: #1a1d27; border: 0.5px solid #2a2d3a; border-radius: 12px; padding: 13px; text-align: center; }
.stat-val { font-size: 24px; font-weight: 600; color: #4ade80; }
.stat-label { font-size: 12px; color: #6b7280; margin-top: 3px; }
.hour-card { background: #1a1d27; border: 0.5px solid #2a2d3a; border-radius: 12px; padding: 13px; margin-bottom: 8px; }
.hour-header { font-size: 14px; font-weight: 500; color: #4ade80; margin-bottom: 8px; }
.hour-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.hour-stat { font-size: 13px; color: #a0a3b1; }
.hour-stat span { color: #f0f0f0; font-weight: 500; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.bar-lbl { font-size: 11px; color: #6b7280; width: 40px; }
.bar-bg { flex: 1; background: #0f1117; border-radius: 4px; height: 7px; overflow: hidden; }
.bar-fill { height: 7px; border-radius: 4px; background: #4ade80; }
.bar-val { font-size: 11px; color: #a0a3b1; width: 48px; text-align: right; }
.empty-state { text-align: center; color: #4b5563; font-size: 14px; padding: 28px 0; }
.ghost-btn { width: 100%; padding: 11px; background: transparent; border: 0.5px solid #374151; border-radius: 10px; color: #6b7280; font-size: 14px; cursor: pointer; margin-top: 10px; }
.export-btn { width: 100%; padding: 12px; background: #1a1d27; border: 0.5px solid #2a2d3a; border-radius: 10px; color: #4ade80; font-size: 14px; cursor: pointer; margin-top: 8px; display: block; text-align: center; }
</style>
</head>
<body>
<div class="screen">

  <div class="header">
    <div style="font-size:15px;font-weight:500;">🏃 Trail Logger</div>
    <div id="run-clock" style="font-size:13px;color:#6b7280;">start: —</div>
  </div>

  <div class="nav">
    <div class="nav-btn active" onclick="showTab('log')">Log</div>
    <div class="nav-btn" onclick="showTab('history')">Overzicht</div>
    <div class="nav-btn" onclick="showTab('summary')">Summary</div>
    <div class="nav-btn" onclick="showTab('runs')">Runs</div>
  </div>

  <div id="start-section" style="margin-bottom:14px;">
    <button onclick="startRun()" style="width:100%;padding:16px;background:#4ade80;border:none;border-radius:14px;color:#0f1117;font-size:17px;font-weight:600;cursor:pointer;">▶ Start run</button>
  </div>

  <div id="live-wrap" style="display:none;">
    <div class="live-log" id="live-log">
      <div class="live-empty">Tik op een product om te loggen</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;">
      <button onclick="downloadJSON()" style="flex:1;padding:9px;background:#1a2e1a;border:0.5px solid #4ade80;border-radius:10px;color:#4ade80;font-size:13px;cursor:pointer;">💾 Tussentijds opslaan</button>
      <button id="undo-btn" onclick="undoLast()" style="display:none;padding:9px 14px;background:#1a1d27;border:0.5px solid #374151;border-radius:10px;color:#f87171;font-size:13px;cursor:pointer;">↩ Ongedaan</button>
    </div>
  </div>

  <!-- LOG TAB -->
  <div id="tab-log">
    <div class="cat-label">Sportdrank</div>
    <div class="products-grid" id="grid-drink"></div>
    <div class="cat-label">Gel</div>
    <div class="products-grid" id="grid-gel"></div>
    <div class="cat-label">Vaste voeding</div>
    <div class="products-grid" id="grid-solid"></div>
    <div class="cat-label">Supplement</div>
    <div class="products-grid" id="grid-supplement"></div>
    <div class="cat-label">Losse invoer</div>
    <div class="custom-section">
      <input type="text" id="custom-input" placeholder="Bijv. halve banaan, pauze..." maxlength="60">
      <button class="add-btn" onclick="logCustom()">+ Voeg toe aan log</button>
    </div>
  </div>

  <!-- OVERZICHT TAB -->
  <div id="tab-history" style="display:none;">
    <div class="log-list" id="log-list-el">
      <div class="empty-state">Nog niets gelogd</div>
    </div>
    <button id="export-btn" onclick="exportToImage()" class="export-btn" style="display:none;">📸 Sla op als afbeelding</button>
    <button id="download-btn" onclick="downloadJSON()" class="export-btn" style="display:none;color:#38bdf8;border-color:#1e3a4a;">💾 Download data (JSON)</button>
    <button onclick="endRun()" class="export-btn" style="color:#4ade80;border-color:#1e3a1e;">🏁 Beëindig run</button>
    <button class="ghost-btn" onclick="resetLog()">Reset log (zonder opslaan)</button>
  </div>

  <!-- SUMMARY TAB -->
  <div id="tab-summary" style="display:none;">
    <div id="summary-content">
      <div class="empty-state">Start met loggen om een summary te zien</div>
    </div>
    <div style="margin-top:16px;background:#1a1d27;border:0.5px solid #2a2d3a;border-radius:14px;padding:14px;">
      <div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Run opslaan / laden</div>
      <button onclick="downloadJSON()" style="width:100%;padding:11px;background:transparent;border:0.5px solid #1e3a4a;border-radius:10px;color:#38bdf8;font-size:14px;cursor:pointer;margin-bottom:8px;">💾 Download run als JSON</button>
      <label style="width:100%;display:block;">
        <div style="width:100%;padding:11px;background:transparent;border:0.5px solid #374151;border-radius:10px;color:#6b7280;font-size:14px;cursor:pointer;text-align:center;">📂 Laad eerdere run (JSON)</div>
        <input type="file" accept=".json" onchange="uploadJSON(event)" style="display:none;">
      </label>
      <div id="upload-msg" style="font-size:12px;color:#4ade80;margin-top:8px;display:none;text-align:center;"></div>
    </div>
  </div>

  <!-- RUNS TAB -->
  <div id="tab-runs" style="display:none;">
    <div id="runs-list"><div class="empty-state">Nog geen runs opgeslagen</div></div>
  </div>

</div>
<script>
var DB = [
  { id:'p0',  name:'Water',               type:'drink',      icon:'💧', volume:500, cho:0,  na:0,   k:0,   caf:0,  portie:'500ml' },
  { id:'p1',  name:'Naak Ultra Energy',   type:'drink',      icon:'💧', volume:500, cho:55, na:400, k:200, caf:0,  portie:'72g / 2 scoops' },
  { id:'p2',  name:'Precision Carb',      type:'drink',      icon:'💧', volume:500, cho:30, na:0,   k:0,   caf:0,  portie:'2 scoops' },
  { id:'p3',  name:'Maurten DM 160',      type:'drink',      icon:'💧', volume:500, cho:40, na:160, k:0,   caf:0,  portie:'1 sachet' },
  { id:'p4',  name:'Nuun Electrolyte',    type:'drink',      icon:'💧', volume:500, cho:4,  na:300, k:150, caf:0,  portie:'1 tablet' },
  { id:'p14', name:'Cola',                type:'drink',      icon:'🥤', volume:250, cho:25, na:0,   k:0,   caf:0,  portie:'250ml' },
  { id:'p5',  name:'Maurten Gel 160',     type:'gel',        icon:'🟢', volume:0,   cho:40, na:80,  k:0,   caf:0,  portie:'1 gel' },
  { id:'p6',  name:'Precision PF90',      type:'gel',        icon:'🟢', volume:0,   cho:90, na:0,   k:0,   caf:0,  portie:'1 pouch' },
  { id:'p13', name:'Precision 30 Gel',    type:'gel',        icon:'🟢', volume:0,   cho:30, na:0,   k:0,   caf:0,  portie:'1 gel' },
  { id:'p7',  name:'Precision PF60',      type:'solid',      icon:'🍬', volume:0,   cho:60, na:40,  k:0,   caf:0,  portie:'1 bar' },
  { id:'p8',  name:'Decathlon Fruit Mix', type:'solid',      icon:'🍓', volume:0,   cho:22, na:0,   k:0,   caf:0,  portie:'90g' },
  { id:'p9',  name:'Clif Bloks Cherry',   type:'solid',      icon:'🍬', volume:0,   cho:44, na:50,  k:20,  caf:0,  portie:'1 bar' },
  { id:'p12', name:'Pinda M&Ms',          type:'solid',      icon:'🍫', volume:0,   cho:16, na:50,  k:0,   caf:0,  portie:'30g' },
  { id:'p15', name:'Fruit Jelly',         type:'solid',      icon:'🍡', volume:0,   cho:21, na:0,   k:0,   caf:0,  portie:'25g' },
  { id:'p10', name:'Electrolyte Caps',    type:'supplement', icon:'🧂', volume:0,   cho:0,  na:250, k:0,   caf:0,  portie:'1 capsule' },
  { id:'p11', name:'Virtuoos Cafeine',    type:'supplement', icon:'⚡', volume:0,   cho:0,  na:0,   k:0,   caf:50, portie:'1 capsule' }
];

var log = [], startTime = null, running = false, idb = null;

function pad(n) { return String(n).padStart(2,'0'); }
function nowStr() { var d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function clockStr(ts) { var d=new Date(ts); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function runSecs(ts) { return startTime ? Math.floor((ts-startTime)/1000) : 0; }
function fmtInterval(secs) { var m=Math.floor(secs/60),s=secs%60; return '+'+(m>0?m+'m':'')+s+'s'; }
function detailStr(p) {
  var parts=[];
  if(p.cho) parts.push(p.cho+'g KH');
  if(p.volume) parts.push(p.volume+'ml');
  if(p.na) parts.push(p.na+'mg Na');
  if(p.caf) parts.push(p.caf+'mg caf');
  return parts.length ? parts.join(' · ') : p.portie;
}
function vibrate(pat) { if(navigator.vibrate) navigator.vibrate(pat||60); }

// ── IndexedDB ─────────────────────────────────────────────────
function openDB(cb) {
  if (idb) { cb(idb); return; }
  var req = indexedDB.open('trail-logger', 1);
  req.onupgradeneeded = function(e) {
    var d = e.target.result;
    if (!d.objectStoreNames.contains('sessions')) {
      d.createObjectStore('sessions', { keyPath: 'id' });
    }
  };
  req.onsuccess = function(e) { idb = e.target.result; cb(idb); };
  req.onerror   = function()  { console.warn('IndexedDB fout'); };
}

function saveSession() {
  localStorage.setItem('trail-active', JSON.stringify({ log:log, startTime:startTime, running:running }));
  openDB(function(d) {
    d.transaction('sessions','readwrite').objectStore('sessions').put({ id:'active', log:log, startTime:startTime, running:running });
  });
}

function loadSession() {
  openDB(function(d) {
    var req = d.transaction('sessions','readonly').objectStore('sessions').get('active');
    req.onsuccess = function(e) {
      var data = e.target.result;
      if (!data || !data.log || !data.log.length) {
        try { var raw=localStorage.getItem('trail-active'); if(raw) data=JSON.parse(raw); } catch(err){}
      }
      if (!data || !data.log || !data.log.length) return;
      log=data.log; startTime=data.startTime; running=data.running;
      document.getElementById('run-clock').textContent='start: '+clockStr(startTime);
      document.getElementById('start-section').innerHTML=
        '<div style="background:#1a2e1a;border:0.5px solid #4ade80;border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;">'+
        '<div style="width:10px;height:10px;border-radius:50%;background:#4ade80;flex-shrink:0;"></div>'+
        '<div style="font-size:13px;color:#4ade80;font-weight:500;">Sessie hersteld — '+log.length+' items</div></div>';
      document.getElementById('live-wrap').style.display='';
      renderLiveFeed(); updateUndoBtn();
    };
  });
}

function archiveRun() {
  if (!log.length) return;
  var run = {
    id: 'run-'+Date.now(), date: new Date().toISOString(),
    startTime: startTime, log: log,
    totals: {
      cho:  log.reduce(function(s,e){return s+(e.cho||0);},0),
      ml:   log.reduce(function(s,e){return s+(e.ml||0);},0),
      na:   log.reduce(function(s,e){return s+(e.na||0);},0),
      caf:  log.reduce(function(s,e){return s+(e.caf||0);},0),
      items:log.length
    }
  };
  openDB(function(d) { d.transaction('sessions','readwrite').objectStore('sessions').put(run); });
}

function loadRuns(cb) {
  openDB(function(d) {
    var req = d.transaction('sessions','readonly').objectStore('sessions').getAll();
    req.onsuccess = function(e) {
      var runs = (e.target.result||[]).filter(function(r){return r.id!=='active';});
      runs.sort(function(a,b){return b.startTime-a.startTime;});
      cb(runs);
    };
  });
}

function deleteRun(id) {
  openDB(function(d) {
    d.transaction('sessions','readwrite').objectStore('sessions').delete(id);
    setTimeout(function(){renderRuns();}, 100);
  });
}
// ── einde IndexedDB ───────────────────────────────────────────

function startRun() {
  startTime=Date.now(); running=true;
  document.getElementById('start-section').innerHTML=
    '<div style="background:#1a2e1a;border:0.5px solid #4ade80;border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;">'+
    '<div style="width:10px;height:10px;border-radius:50%;background:#4ade80;flex-shrink:0;"></div>'+
    '<div style="font-size:13px;color:#4ade80;font-weight:500;">Run gestart om '+nowStr()+'</div></div>';
  document.getElementById('live-wrap').style.display='';
  document.getElementById('run-clock').textContent='start: '+nowStr();
  saveSession();
}

function addEntry(entry) {
  if(!running) return;
  log.push(entry); vibrate(60); renderLiveFeed(); updateUndoBtn(); saveSession();
}

function logProduct(p, btn) {
  var now=Date.now(), prev=log.length?log[log.length-1]:null;
  addEntry({ts:now, name:p.name, icon:p.icon, cho:p.cho||0, ml:p.volume||0, na:p.na||0, caf:p.caf||0, interval:prev?Math.floor((now-prev.ts)/1000):null, custom:false});
  btn.classList.add('flashed');
  setTimeout(function(){btn.classList.remove('flashed');},500);
}

function logCustom() {
  var inp=document.getElementById('custom-input'), txt=inp.value.trim();
  if(!txt) return;
  var now=Date.now(), prev=log.length?log[log.length-1]:null;
  addEntry({ts:now, name:txt, icon:'📝', cho:0, ml:0, na:0, caf:0, interval:prev?Math.floor((now-prev.ts)/1000):null, custom:true});
  inp.value='';
}

function undoLast() {
  if(!log.length) return;
  log.pop(); vibrate([30,50,30]); renderLiveFeed(); updateUndoBtn(); saveSession();
}

function updateUndoBtn() {
  var btn=document.getElementById('undo-btn');
  if(btn) btn.style.display=log.length?'':'none';
}

function renderLiveFeed() {
  var el=document.getElementById('live-log');
  if(!log.length){el.innerHTML='<div class="live-empty">Tik op een product om te loggen</div>';return;}
  el.innerHTML=log.slice().reverse().slice(0,6).map(function(e){
    var rs=runSecs(e.ts),mm=Math.floor(rs/60),ss=rs%60;
    return '<div class="live-entry"><div class="ts">'+mm+':'+pad(ss)+'</div><div class="licon">'+e.icon+'</div><div class="lname">'+e.name+'</div><div class="intv">'+(e.interval!==null?fmtInterval(e.interval):'')+'</div></div>';
  }).join('');
}

function showTab(tab) {
  var tabs=['log','history','summary','runs'];
  document.querySelectorAll('.nav-btn').forEach(function(b,i){b.classList.toggle('active',tabs[i]===tab);});
  tabs.forEach(function(t){document.getElementById('tab-'+t).style.display=t===tab?'':'none';});
  if(tab==='history') renderHistory();
  if(tab==='summary') renderSummary();
  if(tab==='runs')    renderRuns();
}

function renderHistory() {
  var el=document.getElementById('log-list-el');
  var eb=document.getElementById('export-btn'), db=document.getElementById('download-btn');
  if(!log.length){el.innerHTML='<div class="empty-state">Nog niets gelogd</div>';eb.style.display='none';db.style.display='none';return;}
  eb.style.display=''; db.style.display='';
  var maxHr=Math.max.apply(null,log.map(function(e){return Math.floor(runSecs(e.ts)/3600);}));
  var html='';
  for(var h=0;h<=maxHr;h++){
    var hE=log.filter(function(e){return Math.floor(runSecs(e.ts)/3600)===h;});
    if(!hE.length) continue;
    var hCho=hE.reduce(function(s,e){return s+(e.cho||0);},0);
    var hMl=hE.reduce(function(s,e){return s+(e.ml||0);},0);
    var hNa=hE.reduce(function(s,e){return s+(e.na||0);},0);
    var hCaf=hE.reduce(function(s,e){return s+(e.caf||0);},0);
    html+='<div class="hour-divider">Uur '+(h+1)+'</div>';
    hE.forEach(function(e){
      var i=log.indexOf(e);
      var macros=e.custom?'':[e.cho?e.cho+'g KH':'',e.ml?e.ml+'ml':'',e.na?e.na+'mg Na':'',e.caf?e.caf+'mg caf':''].filter(Boolean).join(' · ');
      var prevTs=i>0?log[i-1].ts:null;
      var intStr=prevTs?fmtInterval(Math.floor((e.ts-prevTs)/1000)):'start';
      html+='<div class="log-item"><div class="log-icon">'+e.icon+'</div><div class="log-info"><div class="log-name">'+e.name+'</div>'+(macros?'<div class="log-meta">'+macros+'</div>':'')+'</div><div style="text-align:right;min-width:64px;"><div class="log-time">'+clockStr(e.ts)+'</div><div class="log-interval">'+intStr+'</div></div></div>';
    });
    html+='<div style="background:#111827;border:0.5px solid #1e3a1e;border-radius:10px;padding:10px 13px;margin:8px 0 12px;display:flex;gap:16px;flex-wrap:wrap;">'+
      '<div style="font-size:11px;color:#4ade80;text-transform:uppercase;letter-spacing:1px;width:100%;margin-bottom:2px;">Totaal uur '+(h+1)+'</div>'+
      (hCho?'<div style="font-size:13px;color:#a0a3b1;"><span style="color:#f0f0f0;font-weight:500;">'+hCho+'g</span> KH</div>':'')+
      (hMl?'<div style="font-size:13px;color:#a0a3b1;"><span style="color:#f0f0f0;font-weight:500;">'+hMl+'ml</span> vocht</div>':'')+
      (hNa?'<div style="font-size:13px;color:#a0a3b1;"><span style="color:#f0f0f0;font-weight:500;">'+hNa+'mg</span> Na</div>':'')+
      (hCaf?'<div style="font-size:13px;color:#a0a3b1;"><span style="color:#f0f0f0;font-weight:500;">'+hCaf+'mg</span> caf</div>':'')+
      '<div style="font-size:13px;color:#a0a3b1;"><span style="color:#f0f0f0;font-weight:500;">'+hE.length+'</span> items</div></div>';
  }
  el.innerHTML=html;
}

function renderSummary() {
  var el=document.getElementById('summary-content');
  if(!log.length){el.innerHTML='<div class="empty-state">Start met loggen om een summary te zien</div>';return;}
  var tCho=log.reduce(function(s,e){return s+(e.cho||0);},0);
  var tMl=log.reduce(function(s,e){return s+(e.ml||0);},0);
  var tNa=log.reduce(function(s,e){return s+(e.na||0);},0);
  var tCaf=log.reduce(function(s,e){return s+(e.caf||0);},0);
  var hrs=Math.max(1,Math.floor((Date.now()-startTime)/1000)/3600);
  var maxHr=Math.max.apply(null,log.map(function(e){return Math.floor(runSecs(e.ts)/3600);}));
  var buckets=[];
  for(var h=0;h<=maxHr;h++){
    var ent=log.filter(function(e){return Math.floor(runSecs(e.ts)/3600)===h;});
    buckets.push({h:h,entries:ent,cho:ent.reduce(function(s,e){return s+(e.cho||0);},0),ml:ent.reduce(function(s,e){return s+(e.ml||0);},0),na:ent.reduce(function(s,e){return s+(e.na||0);},0),caf:ent.reduce(function(s,e){return s+(e.caf||0);},0)});
  }
  var mxC=Math.max.apply(null,buckets.map(function(b){return b.cho;}).concat([1]));
  var mxM=Math.max.apply(null,buckets.map(function(b){return b.ml;}).concat([1]));
  var html='<div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Per uur</div>';
  buckets.forEach(function(b){
    html+='<div class="hour-card"><div class="hour-header">Uur '+(b.h+1)+'</div><div class="hour-stats">'+
      '<div class="hour-stat"><span>'+b.cho+'g</span> KH</div>'+
      '<div class="hour-stat"><span>'+b.ml+'ml</span> vocht</div>'+
      '<div class="hour-stat"><span>'+b.na+'mg</span> Na</div>'+
      (b.caf?'<div class="hour-stat"><span>'+b.caf+'mg</span> caf</div>':'')+
      '<div class="hour-stat"><span>'+b.entries.length+'</span> items</div></div>'+
      '<div class="bar-row"><div class="bar-lbl">KH</div><div class="bar-bg"><div class="bar-fill" style="width:'+Math.round(b.cho/mxC*100)+'%"></div></div><div class="bar-val">'+b.cho+'g</div></div>'+
      '<div class="bar-row"><div class="bar-lbl">Vocht</div><div class="bar-bg"><div class="bar-fill" style="width:'+Math.round(b.ml/mxM*100)+'%;background:#38bdf8"></div></div><div class="bar-val">'+b.ml+'ml</div></div></div>';
  });
  html+='<div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px;">Totaal</div>'+
    '<div class="stat-grid">'+
    '<div class="stat-card"><div class="stat-val">'+tCho+'g</div><div class="stat-label">koolhydraten</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+tMl+'ml</div><div class="stat-label">vocht</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+Math.round(tCho/hrs)+'g</div><div class="stat-label">KH/uur gem.</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+tNa+'mg</div><div class="stat-label">natrium</div></div>'+
    (tCaf?'<div class="stat-card" style="grid-column:1/-1;"><div class="stat-val">'+tCaf+'mg</div><div class="stat-label">cafeine</div></div>':'')+
    '</div>';
  el.innerHTML=html;
}

function renderRuns() {
  var el=document.getElementById('runs-list');
  loadRuns(function(runs){
    if(!runs.length){el.innerHTML='<div class="empty-state">Nog geen runs opgeslagen</div>';return;}
    el.innerHTML=runs.map(function(r){
      var d=new Date(r.startTime);
      var dateStr=d.toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'});
      var timeStr=pad(d.getHours())+':'+pad(d.getMinutes());
      var durSecs=r.log.length?Math.floor((r.log[r.log.length-1].ts-r.startTime)/1000):0;
      var durH=Math.floor(durSecs/3600),durM=Math.floor((durSecs%3600)/60);
      var durStr=(durH>0?durH+'u ':'')+durM+'m';
      return '<div class="hour-card" style="margin-bottom:10px;">'+
        '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;">'+
          '<div><div style="font-size:14px;font-weight:500;color:#f0f0f0;">'+dateStr+' om '+timeStr+'</div>'+
          '<div style="font-size:12px;color:#6b7280;margin-top:2px;">'+durStr+' · '+r.totals.items+' items</div></div>'+
          '<button onclick="deleteRun(\''+r.id+'\')" style="background:none;border:none;color:#4b5563;font-size:20px;cursor:pointer;padding:0 4px;">×</button>'+
        '</div>'+
        '<div class="hour-stats">'+
          (r.totals.cho?'<div class="hour-stat"><span>'+r.totals.cho+'g</span> KH</div>':'')+
          (r.totals.ml?'<div class="hour-stat"><span>'+r.totals.ml+'ml</span> vocht</div>':'')+
          (r.totals.na?'<div class="hour-stat"><span>'+r.totals.na+'mg</span> Na</div>':'')+
          (r.totals.caf?'<div class="hour-stat"><span>'+r.totals.caf+'mg</span> caf</div>':'')+
        '</div></div>';
    }).join('');
  });
}

function downloadJSON() {
  if(!log.length) return;
  var data={version:'1.0',exportedAt:new Date().toISOString(),startTime:startTime,log:log};
  var a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2));
  a.download='trail-run-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function exportToImage() {
  var canvas=document.createElement('canvas');
  var W=640,ROW_H=52,HEADER_H=100,FOOTER_H=60;
  canvas.width=W; canvas.height=HEADER_H+log.length*ROW_H+FOOTER_H;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#0f1117'; ctx.fillRect(0,0,W,canvas.height);
  ctx.fillStyle='#4ade80'; ctx.font='600 22px system-ui,sans-serif'; ctx.fillText('Trail Nutrition Log',24,38);
  var tC=log.reduce(function(s,e){return s+(e.cho||0);},0),tM=log.reduce(function(s,e){return s+(e.ml||0);},0);
  ctx.fillStyle='#6b7280'; ctx.font='14px system-ui,sans-serif';
  ctx.fillText('Start: '+(startTime?clockStr(startTime):'—')+'   '+tC+'g KH   '+tM+'ml vocht',24,62);
  ctx.strokeStyle='#2a2d3a'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(24,78); ctx.lineTo(W-24,78); ctx.stroke();
  ctx.fillStyle='#4b5563'; ctx.font='11px system-ui,sans-serif';
  ['TIJD','PRODUCT','KH','VOCHT','NA','INTERVAL'].forEach(function(t,i){ctx.fillText(t,[24,90,390,436,510,556][i],96);});
  log.forEach(function(e,i){
    var y=HEADER_H+i*ROW_H;
    if(i%2===0){ctx.fillStyle='#13151f';ctx.fillRect(0,y,W,ROW_H);}
    var my=y+ROW_H/2+5; ctx.font='13px system-ui,sans-serif';
    ctx.fillStyle='#4ade80'; ctx.fillText(clockStr(e.ts),24,my);
    ctx.fillStyle='#f0f0f0'; ctx.fillText((e.custom?'* ':'')+e.name.slice(0,22),90,my);
    ctx.fillStyle='#a0a3b1';
    ctx.fillText(e.cho?e.cho+'g':'—',390,my);
    ctx.fillText(e.ml?e.ml+'ml':'—',436,my);
    ctx.fillText(e.na?e.na+'mg':'—',510,my);
    var intStr=i>0?fmtInterval(Math.floor((e.ts-log[i-1].ts)/1000)):'start';
    ctx.fillStyle='#6b7280'; ctx.fillText(intStr,556,my);
    ctx.strokeStyle='#1e2130'; ctx.lineWidth=0.5; ctx.beginPath(); ctx.moveTo(24,y+ROW_H); ctx.lineTo(W-24,y+ROW_H); ctx.stroke();
  });
  ctx.fillStyle='#4b5563'; ctx.font='12px system-ui,sans-serif';
  ctx.fillText('Geexporteerd op '+new Date().toLocaleString('nl-NL'),24,HEADER_H+log.length*ROW_H+20);
  var a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download='trail-log-'+new Date().toISOString().slice(0,10)+'.png';
  a.click();
}

function uploadJSON(event) {
  var file=event.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.log||!Array.isArray(data.log)) throw new Error('Ongeldig formaat');
      log=data.log; startTime=data.startTime||(data.log.length?data.log[0].ts:Date.now()); running=true;
      saveSession();
      document.getElementById('run-clock').textContent='start: '+clockStr(startTime);
      document.getElementById('start-section').innerHTML='<div style="background:#1a2e1a;border:0.5px solid #4ade80;border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;"><div style="width:10px;height:10px;border-radius:50%;background:#4ade80;flex-shrink:0;"></div><div style="font-size:13px;color:#4ade80;font-weight:500;">Run geladen — '+log.length+' items</div></div>';
      document.getElementById('live-wrap').style.display='';
      renderLiveFeed(); updateUndoBtn();
      var msg=document.getElementById('upload-msg');
      msg.textContent='✓ '+log.length+' items geladen uit '+file.name; msg.style.display='';
      renderSummary();
    }catch(err){alert('Kon bestand niet laden: '+err.message);}
  };
  reader.readAsText(file);
}

function endRun() {
  if(!log.length) return;
  if(!confirm('Run beëindigen en opslaan?')) return;
  downloadJSON();
  archiveRun();
  log=[]; startTime=null; running=false;
  localStorage.removeItem('trail-active');
  openDB(function(d){d.transaction('sessions','readwrite').objectStore('sessions').delete('active');});
  document.getElementById('run-clock').textContent='start: —';
  document.getElementById('start-section').innerHTML='<button onclick="startRun()" style="width:100%;padding:16px;background:#4ade80;border:none;border-radius:14px;color:#0f1117;font-size:17px;font-weight:600;cursor:pointer;">▶ Start run</button>';
  document.getElementById('live-wrap').style.display='none';
  document.getElementById('undo-btn').style.display='none';
  renderLiveFeed(); showTab('runs');
}

function resetLog() {
  if(!confirm('Log wissen zonder opslaan?')) return;
  log=[]; startTime=null; running=false;
  localStorage.removeItem('trail-active');
  openDB(function(d){d.transaction('sessions','readwrite').objectStore('sessions').delete('active');});
  document.getElementById('run-clock').textContent='start: —';
  document.getElementById('start-section').innerHTML='<button onclick="startRun()" style="width:100%;padding:16px;background:#4ade80;border:none;border-radius:14px;color:#0f1117;font-size:17px;font-weight:600;cursor:pointer;">▶ Start run</button>';
  document.getElementById('live-wrap').style.display='none';
  document.getElementById('undo-btn').style.display='none';
  renderLiveFeed(); showTab('log');
}

// Bouw productgrids
['drink','gel','solid','supplement'].forEach(function(type){
  var g=document.getElementById('grid-'+type);
  DB.filter(function(p){return p.type===type;}).forEach(function(p){
    var btn=document.createElement('button'); btn.className='product-btn';
    btn.innerHTML='<div class="icon">'+p.icon+'</div><div class="name">'+p.name+'</div><div class="detail">'+detailStr(p)+'</div>';
    btn.onclick=function(){logProduct(p,btn);};
    g.appendChild(btn);
  });
});

if('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
loadSession();
